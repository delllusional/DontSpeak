<svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <!-- DMG installer background for DontSpeak (a speech layer for Claude Code).
       Abstract, modern, soft-pastel: an aurora gradient mesh with faint "sound"
       ripples radiating from where the app icon sits (left), and a minimal arrow
       to the Applications folder (right). Kept light so the dark app icon + the
       blue Applications folder both contrast and pop. Rendered by make-dmg.sh via
       rsvg-convert (vector = retina-crisp, editable). -->
  <defs>
    <radialGradient id="lav" cx="20%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#e6d8f6"/><stop offset="100%" stop-color="#e6d8f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peach" cx="82%" cy="80%" r="62%">
      <stop offset="0%" stop-color="#fbe2d6"/><stop offset="100%" stop-color="#fbe2d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mint" cx="60%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#d2f0e2"/><stop offset="100%" stop-color="#d2f0e2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sky" cx="70%" cy="8%" r="50%">
      <stop offset="0%" stop-color="#dcebfb"/><stop offset="100%" stop-color="#dcebfb" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="700" height="420" fill="#f6f2fb"/>
  <g filter="url(#soft)">
    <rect width="700" height="420" fill="url(#lav)"/>
    <rect width="700" height="420" fill="url(#peach)"/>
    <rect width="700" height="420" fill="url(#mint)"/>
    <rect width="700" height="420" fill="url(#sky)"/>
  </g>
  <g fill="none" stroke="#b3a2d6">
    <circle cx="185" cy="172" r="78"  stroke-width="2"   stroke-opacity="0.42"/>
    <circle cx="185" cy="172" r="116" stroke-width="1.6" stroke-opacity="0.26"/>
    <circle cx="185" cy="172" r="158" stroke-width="1.2" stroke-opacity="0.16"/>
    <circle cx="185" cy="172" r="202" stroke-width="1"   stroke-opacity="0.09"/>
  </g>
  <g stroke="#8d7fb0" fill="#8d7fb0" stroke-linecap="round">
    <line x1="284" y1="178" x2="402" y2="178" stroke-width="4"/>
    <polygon points="396,166 396,190 426,178" stroke="none"/>
  </g>
</svg>
