# PipeWire drop-in: load module-echo-cancel and expose a WebRTC-cancelled virtual
# source named `ds_ec_source` — the source DontSpeak's full-duplex AEC backend
# (rust/crates/ds-aec/src/linux.rs) opens by name. Capture-side AEC: TTS keeps
# rendering on the normal output; the canceller references the render endpoint itself.
#
# Install:  cp 99-ds-aec.conf ~/.config/pipewire/pipewire.conf.d/
#           systemctl --user restart pipewire pipewire-pulse
# Verify:   pw-cli ls Node | grep ds_ec_source   (or: pactl list sources short)
#
# Then enable full-duplex in DontSpeak via the MCP: set_config full_duplex=true.

context.modules = [
  { name = libpipewire-module-echo-cancel
    args = {
      # WebRTC canceller; ~10 ms node latency keeps the cancelled source low-latency.
      aec.method = webrtc
      node.latency = 480/48000
      capture.props = {
        node.name    = "ds_ec_capture"
        node.passive = true
      }
      source.props = {
        node.name        = "ds_ec_source"
        node.description = "DontSpeak echo-cancelled source"
      }
      sink.props = {
        node.name        = "ds_ec_sink"
        node.description = "DontSpeak echo-cancel sink"
      }
      playback.props = {
        node.name    = "ds_ec_playback"
        node.passive = true
      }
    }
  }
]
