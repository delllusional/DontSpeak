<?xml version="1.0" encoding="UTF-8"?>
<!-- DontSpeak menu-bar (status item) icon — TEMPLATE source. A single-colour mark:
     a filled speech bubble with the code "</>" glyph KNOCKED OUT (transparent), so
     macOS tints the solid shape to the menu-bar colour (light/dark) and the glyph
     reads as holes. Mirrors the app icon's bubble+</> (assets/icon.svg). Rendered
     to a vector PDF template at bundle time (apps/macos/bundle.sh, rsvg-convert -f pdf)
     and loaded as an isTemplate NSImage by the SwiftUI MenuBarExtra. -->
<svg width="36" height="36" viewBox="40 27 460 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- white = kept (tinted), black = knocked out. -->
    <mask id="cut">
      <path d="M 270,90 C 390,90 470,165 470,250 C 470,335 390,410 270,410
               C 238,410 205,404 178,392 L 115,425 C 102,432 90,420 96,406
               L 112,365 C 86,335 70,295 70,250 C 70,165 150,90 270,90 Z" fill="#FFFFFF"/>
      <g fill="none" stroke="#000000" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 215,200 L 160,250 L 215,300"/>
        <path d="M 275,170 L 235,330"/>
        <path d="M 295,200 L 350,250 L 295,300"/>
      </g>
    </mask>
  </defs>
  <path d="M 270,90 C 390,90 470,165 470,250 C 470,335 390,410 270,410
           C 238,410 205,404 178,392 L 115,425 C 102,432 90,420 96,406
           L 112,365 C 86,335 70,295 70,250 C 70,165 150,90 270,90 Z"
        fill="#000000" mask="url(#cut)"/>
</svg>
