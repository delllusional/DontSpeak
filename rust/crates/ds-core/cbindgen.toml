# cbindgen config for the ds-core C-ABI header. The header is GENERATED from
# the `extern "C"` surface in src/ffi.rs (run `cargo build -p ds-core
# --features cbindgen`) and committed so offline/default builds need no cbindgen.
# Do NOT hand-edit dontspeak.h — change the Rust FFI (or this config) and regenerate,
# so the header can never drift from the actual #[repr(C)] ABI.
language = "C"
style = "type"
pragma_once = true
include_guard = "DONTSPEAK_H"
# Emit the `#ifdef __cplusplus extern "C" { … }` guard so a future C++/WinRT or
# GTK/C++ consumer can include the header directly (Swift imports it as C and
# doesn't need the guard, but it's free future-proofing).
cpp_compat = true
# Emit `size_t` (not `uintptr_t`) for Rust `usize` — Swift imports `size_t` as
# `Int` (which the list-length call sites index with), whereas `uintptr_t` imports
# as `UInt` and breaks `items[i]`.
usize_is_size_t = true
tab_width = 4
documentation = true
documentation_style = "c99"

header = """
/*
 * dontspeak.h — the stable C ABI for ds-core.
 *
 * Bind this header from ANY native UI: SwiftUI (macOS) today; C#/WinRT
 * (Windows) or GTK/C (Linux) later — all call the SAME functions.
 *
 * The app is an informational menu-bar + health panel, so this surface is
 * intentionally TINY and HANDLE-FREE: a few read-only probes, the in-process
 * engine lifecycle (start/stop/reload), localization, two engine actions
 * (model download, TTS provider), and the string free. ALL config (voice /
 * engine / language / rate / toggles) lives in DontSpeak, NOT here.
 *
 * MEMORY / OWNERSHIP / CONTRACT (read before binding):
 *  - HANDLE-FREE: there is no opaque handle and no create/destroy pair — every
 *    function is free-standing and may be called from any thread (each notes
 *    whether it touches disk / IPC).
 *  - STRINGS: every returned `char*` is heap UTF-8, NUL-terminated, owned by
 *    Rust; free it with ds_string_free() (NEVER libc free()). A returning
 *    function never returns NULL — on any failure it returns an owned empty/`"{}"`
 *    /`"[]"` string you still free. Inbound `const char*` is borrowed for the call
 *    only and copied immediately; NULL is treated as empty / the documented default.
 *  - RETURN CODES: the u8-returning actions return 1 on success and 0 on failure
 *    (engine down, bad input, or a caught panic) — there are no negative error
 *    codes and no out-of-band error channel. Probes return the value directly.
 *  - PANICS: every function catches Rust panics at the boundary and converts them
 *    to the documented default (0, or an owned empty/`"{}"`/`"[]"` string), so a
 *    panic never crosses into C.
 *  - PLATFORM: this ABI is platform-agnostic. Platform specifics (input capture,
 *    key injection, permission prompts) are delegated inside Rust; every host —
 *    macOS, Windows, Linux — calls the same functions in-process.
 *
 * GENERATED by cbindgen from src/ffi.rs — do NOT hand-edit. Run
 * `cargo build -p ds-core --features cbindgen` to regenerate.
 */
"""
