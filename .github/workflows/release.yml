name: Release

# Build the Windows portable zips (self-contained — x64 + ARM64) and the macOS app zips
# (signed + notarized DontSpeak.app — Apple silicon AND Intel/x86_64) on a version tag,
# then publish them to a GitHub Release alongside the Linux packages + a checksums.txt.
# The one-command installers at dontspeak.org download + verify these assets.
# Trigger by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
#
# Runner labels are pinned to the current images (mid-2026): windows-2025 (Windows
# Server 2025 / VS 2026) and macos-26 (arm64, Xcode 26) — see runner-images. The
# release is created with the `gh` CLI (GitHub-maintained) rather than a third-party
# action.
#
# macOS signing is GATED on secrets (see docs/signing.md): the full Developer ID sign +
# notarize path runs when APPLE_* secrets exist, else the app is ad-hoc-signed (first
# launch hits Gatekeeper). The Windows portable zip is self-contained and unsigned (the
# app runs from an extracted folder; SmartScreen may warn on first run).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # allow manual runs for testing the build itself

permissions:
  contents: write          # gh release create needs to write the release

jobs:
  # ── Guard: the pushed tag must equal the single-source version ───────────────
  # The one place of truth is rust/Cargo.toml ([workspace.package] version), read via
  # scripts/version.sh. Fail fast (before the long platform builds) if a tag like
  # v0.1.0 doesn't match it, so the app zip / portable zip / About string / tag never drift.
  check:
    name: tag = version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag matches rust/Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          ver="$(bash scripts/version.sh)"
          tag="${GITHUB_REF_NAME#v}"
          echo "single-source version=$ver  tag=$tag"
          [ "$ver" = "$tag" ] || { echo "::error::tag v$tag != rust/Cargo.toml version $ver — bump the workspace version or fix the tag"; exit 1; }

  # ── Tests gate: run the SAME suite as CI, but across ALL THREE OSes, before
  #    building/publishing (per-commit CI is Linux-only; the release is thorough). ──
  tests:
    uses: ./.github/workflows/ci.yml
    with:
      full-matrix: true

  # ── Windows portable zips (self-contained — x64 + ARM64) ────────────────────
  windows:
    needs: [check, tests]
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v7

      # build-portable.ps1 expects per-user toolchains on PATH (~/.dotnet, ~/.cargo). cargo is
      # already there via the preinstalled rustup; install .NET 10 INTO ~/.dotnet so the
      # script's DOTNET_ROOT/PATH assumptions hold with no edits.
      - name: Point .NET install at ~/.dotnet
        shell: pwsh
        run: echo "DOTNET_INSTALL_DIR=$env:USERPROFILE\.dotnet" >> $env:GITHUB_ENV
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'   # the WinUI app targets net10 (WinApp SDK 2.2 + H.NotifyIcon)

      # The ARM64 MSVC tools are already in the image; build-portable.ps1 adds the Rust
      # arm64 target itself.
      - uses: ./.github/actions/ring-asm-windows

      # Self-contained portable zip (bundles .NET + Windows App SDK + engine DLL/helper +
      # dontspeak.exe). -SkipModels keeps it lean — the app downloads the voice models on
      # first launch, the same as macOS/Linux. The one-command installer (web/install.ps1)
      # unzips it and runs `dontspeak wire --all`. Unsigned (runs from an extracted folder).
      - name: Build portable zip (${{ matrix.arch }})
        shell: pwsh
        run: ./apps/windows/installer/build-portable.ps1 -Arch ${{ matrix.arch }} -SkipModels

      - name: Upload portable zip (release artifact)
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable-${{ matrix.arch }}
          # dontspeak-<version>-windows-<x86_64|aarch64>.zip — the only zip Output holds.
          path: apps/windows/installer/Output/*.zip
          if-no-files-found: error

      # The raw cross-built ARM64 binaries — consumed by windows-arm-smoke to RUN them on
      # real ARM64 silicon (this x64 build runner can't execute an arm64 binary).
      - name: Upload raw ARM64 binaries (smoke-test input)
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v7
        with:
          name: windows-binaries-arm64
          # The binaries the Windows portable zip actually ships + runs: the in-process engine
          # DLL, the MCP/hook bin, and the warm-synth helper. (dontspeakd is a library, not a
          # shipped binary — there is no standalone host; the engine runs in-process via the DLL.)
          path: |
            rust/target/aarch64-pc-windows-msvc/release/ds_core.dll
            rust/target/aarch64-pc-windows-msvc/release/dontspeak.exe
            rust/target/aarch64-pc-windows-msvc/release/ds-helper.exe
          if-no-files-found: error

  # ── Smoke-test the ARM64 build on REAL ARM64 Windows ─────────────────────────
  # The windows matrix CROSS-builds arm64 on an x64 runner, which can't execute the output.
  # This runs the actual binaries on a native windows-11-arm runner: the engine DLL must load
  # + answer its C ABI, and the bins must launch (right arch, deps resolve) — proving the
  # shipped ARM64 build actually RUNS, not just compiles.
  windows-arm-smoke:
    needs: windows
    runs-on: windows-11-arm
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: windows-binaries-arm64
          path: arm64bin
      - name: Run the ARM64 binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = (Resolve-Path arm64bin).Path
          # 1) The engine DLL the app P/Invokes loads on ARM64 — a wrong-arch DLL throws
          #    BadImageFormatException; load-dynamic ⇒ no ONNX Runtime needed just to load.
          $h = [System.Runtime.InteropServices.NativeLibrary]::Load("$bin\ds_core.dll")
          [System.Runtime.InteropServices.NativeLibrary]::Free($h)
          Write-Host "OK: ds_core.dll loaded on ARM64"
          # 2) Each exe LAUNCHES on ARM64 — the loader resolves the arch + every dependency. A
          #    wrong-arch / missing-dep binary fails IN THE LOADER (Start-Process throws, or an
          #    NTSTATUS exit < 0 like 0xC000007B). An app-level exit (>= 0) or a still-running
          #    server both mean it launched fine — these are stdio servers, so they normally block.
          foreach ($exe in 'dontspeak.exe','ds-helper.exe') {
            try { $p = Start-Process "$bin\$exe" -PassThru -ErrorAction Stop }
            catch { throw "$exe failed to launch on ARM64: $_" }
            Start-Sleep -Seconds 2
            if ($p.HasExited -and $p.ExitCode -lt 0) { throw ("{0} loader error on ARM64: 0x{1:X8}" -f $exe, $p.ExitCode) }
            # Capture liveness BEFORE killing (else we'd read our own kill code as the exit).
            $status = if ($p.HasExited) { "exit $($p.ExitCode)" } else { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue; "running" }
            Write-Host "OK: $exe launched on ARM64 ($status)"
          }
          Write-Host "ARM64 smoke test passed"

  # ── macOS app DMGs (arm64 + x86_64) ─────────────────────────────────────────
  # Both slices build on the arm64 macos-26 runner: arm64 native, x86_64 cross-compiled
  # (Rust via the added target, Swift via `swift build --arch x86_64`). The Intel slice
  # ships WITHOUT the Apple-Silicon-only Core ML shim (libsmkokoro) — its engine ladder
  # resolves to the system `say` voice + claude_code dictation, which need no onnxruntime.
  macos:
    needs: [check, tests]
    runs-on: macos-26
    env:
      MACOSX_DEPLOYMENT_TARGET: '14.0'
      OUTDIR: ${{ github.workspace }}/dist
      DONTSPEAK_ARCHES: 'arm64 x86_64'   # dist-apps.sh builds one .app.zip per arch
    steps:
      - uses: actions/checkout@v7

      - name: Add Rust apple targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # Gate: run the full distribution path (hardened runtime + Developer ID sign +
      # notarize, the dist-apps.sh DONTSPEAK_DIST=1 branch) only when an Apple Developer
      # ID cert is configured; otherwise build ad-hoc (DIST=0). See docs/signing.md.
      - name: Detect Apple signing config
        id: sign
        env:
          CERT: ${{ secrets.APPLE_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then echo "on=true" >> "$GITHUB_OUTPUT"; else echo "on=false" >> "$GITHUB_OUTPUT"; fi

      # Import the Developer ID Application cert (+ key) into a temporary keychain so
      # codesign can use it. Standard, dependency-free `security` incantation.
      - name: Import Developer ID certificate
        if: steps.sign.outputs.on == 'true'
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          kc="$RUNNER_TEMP/build.keychain"; kcpw="$(openssl rand -hex 16)"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$kcpw" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kcpw" "$kc"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$CERT_PW" -T /usr/bin/codesign
          security list-keychains -d user -s "$kc" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kcpw" "$kc" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      # DONTSPEAK_DIST=1 → bundle libonnxruntime.dylib, hardened-runtime sign inside-out
      # with entitlements, then notarize+staple the .app (via the APPLE_ID trio) and zip it.
      # When unset/0 it ad-hoc-signs and skips notarization — both bundle the app, helper,
      # CLI, shim and separator model; only signing/notarization differs.
      - name: Build app zips (signed + notarized when configured)
        env:
          DONTSPEAK_DIST: ${{ steps.sign.outputs.on == 'true' && '1' || '0' }}
          # Headless runner: never auto-mint a self-signed local-dev cert + codesign with it —
          # that blocks on a keychain-authorization GUI prompt forever. Ad-hoc sign instead when
          # not doing a real Developer-ID dist build. (No-op in dist mode, which skips autosign.)
          DONTSPEAK_NO_AUTOSIGN: '1'
          DONTSPEAK_CODESIGN_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          DONTSPEAK_APPLE_ID: ${{ secrets.APPLE_ID }}
          DONTSPEAK_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DONTSPEAK_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./apps/macos/dist-apps.sh

      - uses: actions/upload-artifact@v7
        with:
          name: macos-apps
          path: dist/*.app.zip
          if-no-files-found: error

  # ── Linux packages (.tar.gz + .deb + .rpm) ──────────────────────────────────
  # The standalone GTK host (apps/linux/gtk) + the engine bins, packaged by
  # apps/linux/package.sh. AppImage is skipped (its GTK bundling is finicky in CI).
  # continue-on-error: the GTK host needs a recent libadwaita (>= 1.7) — on an older
  # runner image this build can fail; that must NOT block the Windows/macOS release,
  # so Linux packages are best-effort and attached only when the job produces them.
  linux:
    needs: [check, tests]
    # The GTK host needs a RECENT GNOME stack — libadwaita >= 1.7 (v1_7) + GTK 4.12 +
    # gtk4-layer-shell — which ubuntu-latest (24.04) is too old for. Ubuntu 26.04 ships
    # libadwaita 1.9 / GTK 4.22 and the layer-shell -dev package (matches windows-2025 /
    # macos-26). continue-on-error keeps a runner-availability hiccup from blocking the release.
    # Both arches build NATIVELY (no cross-compiling): x86_64 on ubuntu-26.04, aarch64 on
    # ubuntu-26.04-arm; package.sh derives ARCH/DEB_ARCH from uname -m.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            arch: x86_64
          - runner: ubuntu-26.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Build deps (GTK4 + libadwaita + layer-shell + ALSA + PulseAudio)
        uses: ./.github/actions/linux-build-deps
        with:
          extra: build-essential libgtk-4-dev libadwaita-1-dev libgtk4-layer-shell-dev

      - name: Packaging tools (cargo-deb + cargo-generate-rpm)
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build Linux packages (.tar.gz + .deb + .rpm)
        run: ./apps/linux/package.sh --skip-appimage

      - uses: actions/upload-artifact@v7
        with:
          name: linux-packages-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ── Publish the GitHub Release with all artifacts ───────────────────────────
  release:
    name: publish release
    needs: [windows, macos, windows-arm-smoke, linux]
    runs-on: ubuntu-latest
    # Only publish a release for an actual tag push (workflow_dispatch just builds).
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create / update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Windows + macOS are required; Linux packages are best-effort (the linux job
          # is continue-on-error) — nullglob drops them silently if the job produced none.
          FILES=(
            artifacts/windows-portable-*/*.zip
            artifacts/macos-apps/*.app.zip
            artifacts/linux-packages-*/*
          )
          # checksums.txt — sha256 of every published asset, by basename, so the
          # dontspeak.org install scripts can verify each download. Built from the SAME
          # FILES list, then shipped alongside them as one more release asset.
          : > checksums.txt
          for f in "${FILES[@]}"; do
            [ -f "$f" ] || continue
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" ) >> "$GITHUB_WORKSPACE/checksums.txt"
          done
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "DontSpeak ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${FILES[@]}" checksums.txt
