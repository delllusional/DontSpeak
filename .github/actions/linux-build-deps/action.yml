name: Linux build deps
description: >
  The apt packages every Linux Rust job needs — cpal links ALSA and ds-aec links
  PulseAudio (neither dev lib is on the hosted runner) plus pkg-config. Pass `extra`
  for job-specific additions (the GTK host stack on the release leg).
inputs:
  extra:
    description: Extra apt packages appended to the audio/base set.
    default: ''
runs:
  using: composite
  steps:
    - name: apt-get build deps
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libpulse-dev pkg-config ${{ inputs.extra }}
